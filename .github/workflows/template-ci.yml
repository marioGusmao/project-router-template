name: template-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest
      - name: Materialize Knowledge/local scaffold
        run: python3 scripts/refresh_knowledge_local.py --apply-missing
      - name: Run tests
        run: python3 -m pytest tests/test_project_router.py tests/test_template_governance.py -q

  agent-surface-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check agent surface parity
        run: python3 scripts/check_agent_surface_parity.py --pre-publish

  repo-ownership:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check repository ownership
        run: python3 scripts/check_repo_ownership.py

  sync-manifest-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check sync manifest alignment
        run: python3 scripts/check_sync_manifest_alignment.py

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate version metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          version = Path("version.txt").read_text(encoding="utf-8").strip()
          template_meta = json.loads(Path("template.meta.json").read_text(encoding="utf-8"))
          release_manifest = json.loads(Path(".release-please-manifest.json").read_text(encoding="utf-8"))

          errors = []
          if template_meta.get("version") != version:
              errors.append(
                  f"template.meta.json version {template_meta.get('version')!r} does not match version.txt {version!r}"
              )
          if release_manifest.get(".") != version:
              errors.append(
                  f".release-please-manifest.json version {release_manifest.get('.')!r} does not match version.txt {version!r}"
              )

          if errors:
              raise SystemExit("\n".join(errors))
          PY

  managed-blocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check managed block markers
        run: python3 scripts/check_managed_blocks.py

  customization-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check customization contracts
        run: python3 scripts/check_customization_contracts.py

  adr-related-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check ADR related links
        run: python3 scripts/check_adr_related_links.py --mode block

  knowledge-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Materialize Knowledge/local scaffold
        run: python3 scripts/refresh_knowledge_local.py --apply-missing
      - name: Check knowledge structure
        run: python3 scripts/check_knowledge_structure.py --strict
