name: template-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python3 -m pytest tests/test_voice_notes.py -q

  agent-surface-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check agent surface parity
        run: python3 scripts/check_agent_surface_parity.py --pre-publish

  repo-ownership:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check repository ownership
        run: python3 scripts/check_repo_ownership.py

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate version metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          template_meta = json.loads(Path("template.meta.json").read_text(encoding="utf-8"))
          release_manifest = json.loads(Path(".release-please-manifest.json").read_text(encoding="utf-8"))

          errors = []
          if template_meta.get("version") != version:
              errors.append(
                  f"template.meta.json version {template_meta.get('version')!r} does not match VERSION {version!r}"
              )
          if release_manifest.get(".") != version:
              errors.append(
                  f".release-please-manifest.json version {release_manifest.get('.')!r} does not match VERSION {version!r}"
              )

          if errors:
              raise SystemExit("\n".join(errors))
          PY
